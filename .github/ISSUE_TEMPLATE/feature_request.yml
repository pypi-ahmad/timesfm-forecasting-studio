name: Feature request
description: Propose a focused improvement tied to a user problem
title: "feat: "
labels:
  - enhancement
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues and documentation for this capability.
          required: true
        - label: This request describes a user problem rather than only an implementation preference.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: Who is blocked, and what outcome cannot be achieved today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed outcome
      description: Describe the minimum behavior that would solve the problem.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Explain current workarounds or simpler alternatives.
    validations:
      required: true
  - type: textarea
    id: tradeoffs
    attributes:
      label: Risks and tradeoffs
      description: Consider local-first behavior, dependencies, memory, security, and model limitations.
    validations:
      required: false
